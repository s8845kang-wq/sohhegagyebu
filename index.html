<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#fafaf8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="소희 가계부">
<title>소희 가계부</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');
:root {
  --bg:#fafaf8; --surface:#fff; --border:#e8e6e1; --border-light:#f0ede8;
  --text:#1a1a18; --muted:#888880; --hint:#b8b4ac; --accent:#2a2a28;
  --income:#1a5c3a; --income-bg:#edf7f2;
  --danger:#b83030; --danger-bg:#fdf0f0;
  --warning:#996020; --warning-bg:#fdf6ec;
  --tab-h:56px; --nav-h:76px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;min-height:100dvh}
#lock{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center}
#lock.hidden{display:none}
.lock-title{font-size:20px;font-weight:700;margin-bottom:8px}
.lock-sub{font-size:13px;color:var(--muted);margin-bottom:40px}
.pin-dots{display:flex;gap:16px;margin-bottom:40px}
.pin-dot{width:14px;height:14px;border-radius:50%;border:1.5px solid #c8c4bc;background:transparent;transition:all .15s}
.pin-dot.on{background:#1a1a18;border-color:#1a1a18}
.pin-dot.err{background:var(--danger);border-color:var(--danger)}
.pin-grid{display:grid;grid-template-columns:repeat(3,72px);gap:12px}
.pin-btn{width:72px;height:72px;border-radius:50%;border:none;background:#fff;font-size:22px;font-weight:500;font-family:inherit;color:#1a1a18;cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,.08);transition:all .1s;display:flex;align-items:center;justify-content:center}
.pin-btn:active{transform:scale(.92);background:#f0ede8}
.pin-del{background:transparent!important;box-shadow:none!important;font-size:18px;color:var(--muted)}
.pin-err{font-size:13px;color:var(--danger);margin-top:20px;height:20px;text-align:center}
.header{position:sticky;top:0;z-index:50;background:var(--bg);border-bottom:1px solid var(--border-light);padding:0 16px;height:var(--tab-h);display:flex;align-items:center;justify-content:space-between}
.header-title{font-size:17px;font-weight:700;letter-spacing:-.5px}
.header-month{display:flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:6px 12px;font-size:13px;font-weight:500}
.header-month select{border:none;background:transparent;font-size:13px;font-weight:500;font-family:inherit;color:var(--text);outline:none;cursor:pointer}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;height:var(--nav-h);background:var(--surface);border-top:1px solid var(--border-light);display:flex;align-items:stretch;z-index:50;padding-bottom:env(safe-area-inset-bottom)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;border:none;background:transparent;color:var(--hint);font-size:10px;font-family:inherit;cursor:pointer;padding-bottom:4px}
.nav-btn.active{color:var(--text)}
.nav-btn svg{width:22px;height:22px;stroke-width:1.6}
.page{display:none;padding:16px 16px calc(var(--nav-h) + 16px)}
.page.active{display:block}
.seg{display:grid;grid-template-columns:1fr 1fr;background:var(--border-light);border-radius:10px;padding:3px;margin-bottom:16px}
.seg-btn{border:none;border-radius:8px;padding:8px;font-size:13px;font-weight:500;font-family:inherit;background:transparent;color:var(--muted);cursor:pointer;transition:all .15s}
.seg-btn.active{background:var(--surface);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.08)}
.card{background:var(--surface);border:1px solid var(--border-light);border-radius:14px;padding:16px;margin-bottom:12px}
.card-label{font-size:11px;color:var(--muted);margin-bottom:10px;font-weight:500;text-transform:uppercase;letter-spacing:.5px}
.form-row{margin-bottom:14px}
.form-label{font-size:12px;color:var(--muted);margin-bottom:6px;display:block}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
input,select{width:100%;padding:11px 13px;border:1px solid var(--border);border-radius:10px;font-size:14px;font-family:inherit;color:var(--text);background:var(--bg);outline:none;-webkit-appearance:none}
input[type=number]{text-align:right}
input:focus,select:focus{border-color:var(--accent)}
.btn{width:100%;padding:14px;border:none;border-radius:12px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;letter-spacing:-.3px}
.btn:active{transform:scale(.98)}
.btn-out{background:var(--text);color:var(--surface)}
.btn-in{background:var(--income);color:#fff}
.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.metric{background:var(--surface);border:1px solid var(--border-light);border-radius:12px;padding:12px 10px}
.metric-label{font-size:10px;color:var(--muted);margin-bottom:4px}
.metric-value{font-size:15px;font-weight:700;letter-spacing:-.5px}
.filter-bar{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.chip{border:1px solid var(--border);border-radius:20px;padding:6px 12px;font-size:12px;font-family:inherit;background:var(--surface);color:var(--muted);cursor:pointer}
.chip.active{background:var(--text);color:var(--surface);border-color:var(--text)}
.list-group{margin-bottom:8px}
.list-gh{display:flex;justify-content:space-between;align-items:center;padding:12px 14px 8px;font-size:12px;color:var(--muted);font-weight:500}
.list-item{background:var(--surface);border:1px solid var(--border-light);border-radius:12px;padding:13px 14px;margin-bottom:6px;display:grid;grid-template-columns:1fr auto auto;gap:10px;align-items:center}
.li-name{font-size:14px;font-weight:500}
.li-sub{font-size:11px;color:var(--hint);margin-top:2px}
.li-amt{font-size:14px;font-weight:700;text-align:right;white-space:nowrap}
.del-btn{border:none;background:var(--border-light);color:var(--muted);border-radius:6px;width:28px;height:28px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.del-btn:active{background:var(--danger-bg);color:var(--danger)}
.badge{display:inline-block;font-size:10px;padding:1px 6px;border-radius:4px;font-weight:500}
.b-fix{background:var(--income-bg);color:var(--income)}
.b-spare{background:var(--warning-bg);color:var(--warning)}
.b-in{background:#e8f0fb;color:#1a4a8a}
.bal-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
.bal-card{background:var(--surface);border:1px solid var(--border-light);border-radius:14px;padding:14px;cursor:pointer}
.bal-card:active{opacity:.8}
.bal-card.total{grid-column:1/-1;border-color:var(--border);cursor:default}
.bal-bank{font-size:12px;color:var(--muted);margin-bottom:6px}
.bal-amt{font-size:18px;font-weight:700;letter-spacing:-.5px;margin-bottom:8px}
.bar-t{height:3px;background:var(--border-light);border-radius:2px}
.bar-f{height:3px;border-radius:2px;transition:width .3s}
.bar-l{font-size:10px;color:var(--hint);margin-top:4px}
.init-row{display:grid;grid-template-columns:72px 1fr;gap:8px;align-items:center;margin-bottom:8px}
.month-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
.month-cell{background:var(--surface);border:1px solid var(--border-light);border-radius:10px;padding:10px 8px;text-align:center}
.cat-row{margin-bottom:12px}
.cat-rh{display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px}
.empty{text-align:center;padding:48px 0;color:var(--hint);font-size:13px}
#toast{position:fixed;bottom:calc(var(--nav-h) + 12px);left:50%;transform:translateX(-50%);background:var(--text);color:var(--surface);padding:10px 18px;border-radius:20px;font-size:13px;font-weight:500;z-index:200;opacity:0;transition:opacity .2s;white-space:nowrap;pointer-events:none}
#toast.show{opacity:1}
#bank-modal{display:none;position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.4)}
.modal-inner{position:absolute;bottom:0;left:0;right:0;background:var(--bg);border-radius:20px 20px 0 0;max-height:80vh;overflow-y:auto;padding:20px 16px calc(env(safe-area-inset-bottom) + 20px)}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.modal-title{font-size:16px;font-weight:700}
.modal-close{border:none;background:var(--border-light);border-radius:50%;width:30px;height:30px;font-size:18px;cursor:pointer;color:var(--muted)}
</style>
</head>
<body>

<div id="lock">
  <div class="lock-title">소희 가계부</div>
  <div class="lock-sub">PIN을 입력해주세요</div>
  <div class="pin-dots">
    <div class="pin-dot" id="d0"></div>
    <div class="pin-dot" id="d1"></div>
    <div class="pin-dot" id="d2"></div>
    <div class="pin-dot" id="d3"></div>
  </div>
  <div class="pin-grid">
    <button class="pin-btn" onclick="pinInput('1')">1</button>
    <button class="pin-btn" onclick="pinInput('2')">2</button>

    <button class="pin-btn" onclick="pinInput('4')">4</button>
    <button class="pin-btn" onclick="pinInput('5')">5</button>
    <button class="pin-btn" onclick="pinInput('6')">6</button>
    <button class="pin-btn" onclick="pinInput('7')">7</button>
    <button class="pin-btn" onclick="pinInput('8')">8</button>
    <button class="pin-btn" onclick="pinInput('9')">9</button>
    <button class="pin-btn" style="visibility:hidden"></button>

  </div>
  <div class="pin-err" id="pin-err"></div>
</div>

<div class="header">
  <div class="header-title">소희 가계부</div>
  <div class="header-month">

    <select id="sel-month" onchange="onMonthChange()">
      <option value="1">1월</option><option value="2">2월</option><option value="3">3월</option>
      <option value="4">4월</option><option value="5">5월</option><option value="6">6월</option>
      <option value="7">7월</option><option value="8">8월</option><option value="9">9월</option>
      <option value="10">10월</option><option value="11">11월</option><option value="12">12월</option>
    </select>
  </div>
</div>

<div id="page-input" class="page active">
  <div class="seg">
    <button class="seg-btn active" id="seg-out" onclick="switchSeg('out')">지출</button>
    <button class="seg-btn" id="seg-in" onclick="switchSeg('in')">수입</button>
  </div>
  <div id="form-out" class="card">
    <div class="form-row"><label class="form-label">날짜 (선택)</label><input type="date" id="out-date"></div>
    <div class="form-row"><label class="form-label">항목</label><select id="out-item" onchange="onItemChange()"><option value="">-- 항목 선택 --</option></select></div>
    <div class="form-grid form-row">
      <div><label class="form-label">금액 (원)</label><input type="number" id="out-amount" placeholder="0"></div>
      <div><label class="form-label">통장</label>
        <select id="out-bank">
          <option value="">-</option>
          <option value="우리881">우리881</option><option value="우리546">우리546</option>
          <option value="우리472">우리472</option><option value="현대카드">현대카드</option>
          <option value="롯데카드">롯데카드</option><option value="삼성카드">삼성카드</option>

    <div class="form-row"><label class="form-label">메모 (선택)</label><input type="text" id="out-memo"></div>

      <select id="in-cat">
        <option value="">-- 항목 선택 --</option>
        <option value="월급">월급</option><option value="PI">PI</option><option value="PS">PS</option>
        <option value="이자">이자</option><option value="용돈">용돈</option><option value="기타">기타</option>
      </select>
    </div>
    <div class="form-grid form-row">
      <div><label class="form-label">금액 (원)</label><input type="number" id="in-amount" placeholder="0"></div>
      <div><label class="form-label">입금 통장</label>
        <select id="in-bank">
          <option value="우리881">우리881</option><option value="우리546">우리546</option>
          <option value="우리472">우리472</option><option value="현대카드">현대카드</option>
          <option value="롯데카드">롯데카드</option><option value="삼성카드">삼성카드</option>
        </select>
      </div>
    </div>
    <div class="form-row"><label class="form-label">메모 (선택)</label><input type="text" id="in-memo"></div>
    <button class="btn btn-in" onclick="addIn()">수입 저장</button>
  </div>
  <div class="metrics" id="summary-metrics"></div>
</div>

<div id="page-list" class="page">
  <div class="filter-bar">
    <button class="chip active" id="f-all" onclick="setFilter('all')">전체</button>
    <button class="chip" id="f-out" onclick="setFilter('out')">지출</button>
    <button class="chip" id="f-in" onclick="setFilter('in')">수입</button>
    <div style="flex:1"></div>
    <button class="chip active" id="sort-cat" onclick="setSort('cat')">항목별</button>
    <button class="chip" id="sort-date" onclick="setSort('date')">날짜별</button>
  </div>
  <div id="list-body"></div>
</div>

<div id="page-balance" class="page">
  <div class="card">
    <div class="card-label">1월 초기 잔고</div>
    <div id="init-fields"></div>
    <div style="font-size:11px;color:var(--hint);margin-top:8px">연초 잔고 입력 시 매달 자동 이월됩니다</div>
  </div>
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
    <div style="font-size:15px;font-weight:700">통장 잔고</div>
    <div style="font-size:12px;color:var(--muted)" id="bal-label"></div>
  </div>
  <div class="bal-grid" id="bal-cards"></div>
</div>

<div id="page-stats" class="page"><div id="stats-body"></div></div>

<div id="page-settings" class="page">
  <div class="card">
    <div class="card-label">데이터 백업</div>
    <p style="font-size:13px;color:var(--muted);margin-bottom:14px;line-height:1.6">지출·수입 내역과 통장 잔고 설정을 JSON 파일로 저장해요.</p>
    <button class="btn btn-out" onclick="exportData()">백업 파일 내려받기</button>
  </div>
  <div class="card">
    <div class="card-label">데이터 복원</div>
    <p style="font-size:13px;color:var(--muted);margin-bottom:14px;line-height:1.6">백업 파일을 불러오면 현재 데이터에 병합돼요.</p>
    <label style="display:block;width:100%;padding:14px;border:1.5px dashed var(--border);border-radius:12px;text-align:center;font-size:14px;color:var(--muted);cursor:pointer">

  </div>
  <div class="card">
    <div class="card-label">데이터 초기화</div>
    <p style="font-size:13px;color:var(--muted);margin-bottom:14px;line-height:1.6">모든 내역과 설정이 삭제돼요. 초기화 전에 반드시 백업하세요.</p>

  </div>
  <div class="card">
    <div class="card-label">저장 현황</div>
    <div id="storage-info"></div>
  </div>
</div>

<nav class="bottom-nav">
  <button class="nav-btn active" onclick="switchPage('input',this)">
    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>입력

  <button class="nav-btn" onclick="switchPage('list',this)">

  </button>
  <button class="nav-btn" onclick="switchPage('balance',this)">

  <button class="nav-btn" onclick="switchPage('stats',this)">

  </button>
  <button class="nav-btn" onclick="switchPage('settings',this)">

  </button>
</nav>

<div id="bank-modal" onclick="closeBankModal()">
  <div class="modal-inner" onclick="event.stopPropagation()">
    <div class="modal-header">
      <div class="modal-title" id="modal-title"></div>
      <button class="modal-close" onclick="closeBankModal()">&#215;</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<div id="toast"></div>

<script>
var PIN = '4588';
var pinVal = '';

function pinInput(n) {
  if (pinVal.length >= 4) return;
  pinVal += n;
  updateDots();
  if (pinVal.length === 4) setTimeout(checkPin, 80);
}

function pinDelete() {
  pinVal = pinVal.slice(0, -1);
  updateDots();
  document.getElementById('pin-err').textContent = '';
}

function updateDots() {
  for (var i = 0; i < 4; i++) {
    document.getElementById('d' + i).className = 'pin-dot' + (i < pinVal.length ? ' on' : '');
  }
}

function checkPin() {
  if (pinVal === PIN) {
    document.getElementById('lock').className = 'hidden';
  } else {
    for (var i = 0; i < 4; i++) document.getElementById('d' + i).className = 'pin-dot err';
    document.getElementById('pin-err').textContent = 'PIN이 틀렸어요. 다시 입력해주세요';
    setTimeout(function() { pinVal = ''; updateDots(); document.getElementById('pin-err').textContent = ''; }, 700);
  }
}

var ITEMS = [

function fmt(n) { return Math.round(n).toLocaleString() + '원'; }

var toastTimer;
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.className = 'show';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { t.className = ''; }, 2000);
}

function switchPage(name, btn) {
  var names = ['input','list','balance','stats','settings'];
  for (var i = 0; i < names.length; i++) {
    document.getElementById('page-' + names[i]).className = 'page' + (names[i] === name ? ' active' : '');
  }
  var btns = document.querySelectorAll('.nav-btn');
  for (var i = 0; i < btns.length; i++) btns[i].className = 'nav-btn';
  btn.className = 'nav-btn active';
  if (name === 'list') renderList();
  if (name === 'balance') { renderInitFields(); renderBalance(); }
  if (name === 'stats') renderStats();
  if (name === 'settings') renderStorageInfo();
}

function switchSeg(type) {
  document.getElementById('form-out').style.display = type === 'out' ? 'block' : 'none';
  document.getElementById('form-in').style.display = type === 'in' ? 'block' : 'none';
  document.getElementById('seg-out').className = 'seg-btn' + (type === 'out' ? ' active' : '');
  document.getElementById('seg-in').className = 'seg-btn' + (type === 'in' ? ' active' : '');
}

function onMonthChange() {
  curMonth = +document.getElementById('sel-month').value;
  renderSummary(); renderList(); renderBalance();
}

function onItemChange() {
  var idx = document.getElementById('out-item').value;
  var bankSel = document.getElementById('out-bank');
  if (!idx) { bankSel.value = ''; document.getElementById('out-amount').value = ''; return; }
  var it = ITEMS[+idx];
  document.getElementById('out-amount').value = it.b || '';
  var opts = bankSel.options;
  if (it.ts) {
    for (var i = 0; i < opts.length; i++) {
      opts[i].style.display = (it.ts.indexOf(opts[i].value) >= 0 || opts[i].value === '') ? '' : 'none';
    }
    bankSel.value = it.t; bankSel.disabled = false;
  } else {
    for (var i = 0; i < opts.length; i++) opts[i].style.display = '';
    bankSel.value = it.t; bankSel.disabled = true;
  }
}

function todayVal() {
  var d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function fmtDate(val) {
  if (!val) return '';
  var p = val.split('-');
  return (+p[1]) + '/' + (+p[2]);
}

function addOut() {
  var idx = document.getElementById('out-item').value;
  var amount = +document.getElementById('out-amount').value;
  var bank = document.getElementById('out-bank').value;
  if (!idx || !amount) { showToast('항목과 금액을 입력해주세요'); return; }
  if (!bank) { showToast('통장을 선택해주세요'); return; }
  var it = ITEMS[+idx];
  entries.push({ type:'out', month:curMonth, date:fmtDate(document.getElementById('out-date').value), cat:it.c, name:it.n, grp:it.g, bank:bank, amount:amount, memo:document.getElementById('out-memo').value.trim(), ts:Date.now() });
  save();
  document.getElementById('out-item').value = '';
  document.getElementById('out-amount').value = '';
  document.getElementById('out-memo').value = '';
  document.getElementById('out-date').value = todayVal();
  var bankSel = document.getElementById('out-bank');
  var opts = bankSel.options;
  for (var i = 0; i < opts.length; i++) opts[i].style.display = '';
  bankSel.disabled = false; bankSel.value = '';
  showToast('지출 저장됐어요'); renderSummary();
}

function addIn() {
  var cat = document.getElementById('in-cat').value;
  var amount = +document.getElementById('in-amount').value;

  entries.push({ type:'in', month:curMonth, date:fmtDate(document.getElementById('in-date').value), cat:cat, name:cat, grp:'수입', bank:document.getElementById('in-bank').value, amount:amount, memo:document.getElementById('in-memo').value.trim(), ts:Date.now() });
  save();
  document.getElementById('in-cat').value = '';

  document.getElementById('in-memo').value = '';

}

function renderSummary() {
  var totalOut = 0, totalIn = 0;
  for (var i = 0; i < entries.length; i++) {
    if (entries[i].month === curMonth) {
      if (entries[i].type === 'out') totalOut += entries[i].amount;
      else totalIn += entries[i].amount;
    }
  }
  var net = totalIn - totalOut;
  document.getElementById('summary-metrics').innerHTML =
    '<div class="metric"><div class="metric-label">' + curMonth + '월 수입</div><div class="metric-value" style="color:var(--income)">' + fmt(totalIn) + '</div></div>' +
    '<div class="metric"><div class="metric-label">' + curMonth + '월 지출</div><div class="metric-value">' + fmt(totalOut) + '</div></div>' +
    '<div class="metric"><div class="metric-label">순수지</div><div class="metric-value" style="color:' + (net>=0?'var(--income)':'var(--danger)') + '">' + (net>=0?'+':'') + fmt(net) + '</div></div>';
}

function setFilter(filter) {
  listFilter = filter;
  document.getElementById('f-all').className = 'chip' + (filter==='all'?' active':'');
  document.getElementById('f-out').className = 'chip' + (filter==='out'?' active':'');
  document.getElementById('f-in').className = 'chip' + (filter==='in'?' active':'');
  renderList();
}

function setSort(sort) {
  listSort = sort;
  document.getElementById('sort-cat').className = 'chip' + (sort==='cat'?' active':'');
  document.getElementById('sort-date').className = 'chip' + (sort==='date'?' active':'');
  renderList();
}

function renderList() {
  var me = [];
  for (var i = 0; i < entries.length; i++) {
    if (entries[i].month === curMonth && (listFilter === 'all' || entries[i].type === listFilter)) me.push(entries[i]);
  }
  me.sort(function(a,b) { return b.ts - a.ts; });
  var cont = document.getElementById('list-body');
  if (!me.length) { cont.innerHTML = '<div class="empty">내역이 없어요</div>'; return; }
  var grouped = {}, keys = [];
  for (var i = 0; i < me.length; i++) {
    var e = me[i];
    var k = listSort === 'date' ? (e.date || '날짜 없음') : (e.type === 'in' ? '수입 · ' + e.cat : e.cat);
    if (!grouped[k]) { grouped[k] = []; keys.push(k); }
    grouped[k].push(e);
  }
  if (listSort === 'date') {
    keys.sort(function(a,b) {
      if (a === '날짜 없음') return 1;
      if (b === '날짜 없음') return -1;
      var ap = a.split('/'), bp = b.split('/');
      return (+bp[0]*100 + +bp[1]) - (+ap[0]*100 + +ap[1]);
    });
  }
  var html = '';
  for (var ki = 0; ki < keys.length; ki++) {
    var k = keys[ki];
    var list = grouped[k];
    var total = 0;
    var isIn = list[0].type === 'in';
    for (var li = 0; li < list.length; li++) total += list[li].amount;
    html += '<div class="list-group"><div class="list-gh"><span>' + k + '</span><span style="color:' + (isIn?'var(--income)':'var(--muted)') + '">' + (isIn?'+':'') + fmt(total) + '</span></div>';
    for (var li = 0; li < list.length; li++) {
      var e = list[li];
      var gi = entries.indexOf(e);
      var bc = e.type==='in' ? 'b-in' : e.grp==='고정비' ? 'b-fix' : 'b-spare';
      var bt = e.type==='in' ? '수입' : e.grp;
      html += '<div class="list-item"><div><div class="li-name">' + e.name + '</div><div class="li-sub">' + (e.date?e.date+' · ':'') + '<span class="badge ' + bc + '">' + bt + '</span> · ' + e.bank + (e.memo?' · '+e.memo:'') + '</div></div><div class="li-amt" style="color:' + (e.type==='in'?'var(--income)':'var(--text)') + '">' + (e.type==='in'?'+':'') + fmt(e.amount) + '</div><button class="del-btn" onclick="delEntry(' + gi + ')">&#215;</button></div>';
    }
    html += '</div>';
  }
  cont.innerHTML = html;
}

function delEntry(idx) {
  if (!confirm('삭제할까요?')) return;
  entries.splice(idx, 1); save(); renderList(); renderSummary();
}

function getBalAt(bank, month) {
  var bal = initBal[bank] || 0;
  for (var i = 0; i < entries.length; i++) {
    var e = entries[i];
    if (e.month <= month && e.bank === bank) bal += e.type === 'in' ? e.amount : -e.amount;
  }
  return bal;
}

function renderInitFields() {
  var html = '';
  for (var i = 0; i < BANKS.length; i++) {
    var b = BANKS[i];
    html += '<div class="init-row"><div style="font-size:13px;font-weight:500">' + b + '</div><input type="number" value="' + (initBal[b]||'') + '" placeholder="0" data-bank="' + b + '" onchange="initBal[this.dataset.bank]=+this.value;save();renderBalance()"></div>';
  }
  document.getElementById('init-fields').innerHTML = html;
}

function renderBalance() {
  document.getElementById('bal-label').textContent = curMonth + '월 기준';
  var grandTotal = 0;
  var cards = '';
  for (var i = 0; i < BANKS.length; i++) {
    var b = BANKS[i];
    var bal = getBalAt(b, curMonth);
    grandTotal += bal;
    var prevBal = getBalAt(b, curMonth - 1);
    var mOut = 0, mIn = 0;
    for (var j = 0; j < entries.length; j++) {
      if (entries[j].month === curMonth && entries[j].bank === b) {
        if (entries[j].type === 'out') mOut += entries[j].amount;
        else mIn += entries[j].amount;
      }
    }
    var pct = prevBal > 0 ? Math.min(Math.round((prevBal-bal)/prevBal*100), 100) : 0;
    var barC = pct > 85 ? 'var(--danger)' : pct > 60 ? 'var(--warning)' : 'var(--income)';
    cards += '<div class="bal-card" onclick="openBankModal(\'' + b + '\')"><div class="bal-bank">' + b + '</div><div class="bal-amt" style="color:' + (bal<0?'var(--danger)':'var(--text)') + '">' + fmt(bal) + '</div><div style="font-size:10px;color:var(--hint);margin-bottom:6px">+' + fmt(mIn) + ' / -' + fmt(mOut) + '</div><div class="bar-t"><div class="bar-f" style="background:' + barC + ';width:' + pct + '%"></div></div><div class="bar-l">소진 ' + pct + '% · 탭해서 내역보기</div></div>';
  }
  document.getElementById('bal-cards').innerHTML = '<div class="bal-card total"><div class="bal-bank">전체 합계</div><div class="bal-amt" style="font-size:22px;color:' + (grandTotal<0?'var(--danger)':'var(--text)') + '">' + fmt(grandTotal) + '</div></div>' + cards;
}

function openBankModal(bank) {
  document.getElementById('modal-title').textContent = bank + ' 이력';
  var me = [];
  for (var i = 0; i < entries.length; i++) { if (entries[i].bank === bank) me.push(entries[i]); }
  me.sort(function(a,b) { return b.ts - a.ts; });
  if (!me.length) { document.getElementById('modal-body').innerHTML = '<div class="empty">이력이 없어요</div>'; }
  else {
    var grouped = {}, keys = [];
    for (var i = 0; i < me.length; i++) {
      var e = me[i];
      var k = e.month + '월' + (e.date ? ' ' + e.date : '');
      if (!grouped[k]) { grouped[k] = []; keys.push(k); }
      grouped[k].push(e);
    }
    keys.sort(function(a,b) {
      var am = parseInt(a), bm = parseInt(b);
      if (bm !== am) return bm - am;
      var getDay = function(s) { var m = s.match(/(\d+)\/(\d+)/); return m ? +m[1]*100 + +m[2] : 0; };
      return getDay(b) - getDay(a);
    });
    var html = '';
    for (var ki = 0; ki < keys.length; ki++) {
      var k = keys[ki]; var list = grouped[k];
      var tOut = 0, tIn = 0;
      for (var li = 0; li < list.length; li++) { if (list[li].type==='out') tOut+=list[li].amount; else tIn+=list[li].amount; }
      html += '<div style="margin-bottom:16px"><div style="display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--muted);font-weight:600;margin-bottom:8px;padding-bottom:6px;border-bottom:1.5px solid var(--border)"><span>' + k + '</span><span style="display:flex;gap:8px">' + (tIn?'<span style="color:var(--income)">+'+fmt(tIn)+'</span>':'') + (tOut?'<span>-'+fmt(tOut)+'</span>':'') + '</span></div>';
      for (var li = 0; li < list.length; li++) {
        var e = list[li];
        var bc = e.type==='in'?'b-in':e.grp==='고정비'?'b-fix':'b-spare';
        html += '<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 4px;border-bottom:.5px solid var(--border-light);gap:12px"><div style="flex:1;min-width:0"><div style="font-size:14px;font-weight:500">' + e.name + '</div><div style="font-size:11px;color:var(--hint);margin-top:2px"><span class="badge ' + bc + '">' + (e.type==='in'?'수입':e.grp) + '</span>' + (e.memo?' · '+e.memo:'') + '</div></div><div style="font-size:15px;font-weight:700;color:' + (e.type==='in'?'var(--income)':'var(--text)') + ';white-space:nowrap;padding-right:4px">' + (e.type==='in'?'+':'') + fmt(e.amount) + '</div></div>';
      }
      html += '</div>';
    }
    document.getElementById('modal-body').innerHTML = html;
  }
  document.getElementById('bank-modal').style.display = 'block';
  document.body.style.overflow = 'hidden';
}

function closeBankModal() {
  document.getElementById('bank-modal').style.display = 'none';
  document.body.style.overflow = '';
}

function renderStats() {
  var html = '<div style="font-size:13px;font-weight:700;margin-bottom:10px">월별 순수지</div><div class="month-grid">';
  for (var m = 1; m <= 12; m++) {
    var out = 0, inc = 0;
    for (var i = 0; i < entries.length; i++) {
      if (entries[i].month === m) { if (entries[i].type==='out') out+=entries[i].amount; else inc+=entries[i].amount; }
    }
    var net = inc - out; var has = out > 0 || inc > 0;
    html += '<div class="month-cell"><div style="font-size:11px;color:var(--muted);margin-bottom:4px">' + m + '월</div><div style="font-size:13px;font-weight:700;color:' + (!has?'var(--hint)':net>=0?'var(--income)':'var(--danger)') + '">' + (has?(net>=0?'+':'')+Math.round(net/10000)+'만':'-') + '</div></div>';
  }
  html += '</div>';
  var incMap = {}, outMap = {};
  for (var i = 0; i < entries.length; i++) {
    var e = entries[i];
    if (e.type==='in') incMap[e.cat] = (incMap[e.cat]||0) + e.amount;
    else outMap[e.cat] = (outMap[e.cat]||0) + e.amount;
  }
  var incKeys = Object.keys(incMap).sort(function(a,b){return incMap[b]-incMap[a];});
  var outKeys = Object.keys(outMap).sort(function(a,b){return outMap[b]-outMap[a];});
  if (incKeys.length) {
    html += '<div style="font-size:13px;font-weight:700;margin:16px 0 10px">수입 항목별</div>';
    var maxI = incMap[incKeys[0]];
    for (var i = 0; i < incKeys.length; i++) { var pct = Math.round(incMap[incKeys[i]]/maxI*100); html += '<div class="cat-row"><div class="cat-rh"><span>'+incKeys[i]+'</span><span style="color:var(--income)">+'+fmt(incMap[incKeys[i]])+'</span></div><div class="bar-t"><div class="bar-f" style="background:var(--income);width:'+pct+'%"></div></div></div>'; }
  }
  if (outKeys.length) {
    html += '<div style="font-size:13px;font-weight:700;margin:16px 0 10px">지출 분류별</div>';
    var maxO = outMap[outKeys[0]];
    for (var i = 0; i < outKeys.length; i++) { var pct = Math.round(outMap[outKeys[i]]/maxO*100); html += '<div class="cat-row"><div class="cat-rh"><span>'+outKeys[i]+'</span><span>'+fmt(outMap[outKeys[i]])+'</span></div><div class="bar-t"><div class="bar-f" style="background:var(--accent);opacity:.4;width:'+pct+'%"></div></div></div>'; }
  }
  if (!incKeys.length && !outKeys.length) html += '<div class="empty">아직 데이터가 없어요</div>';
  document.getElementById('stats-body').innerHTML = html;
}

function exportData() {
  var d = new Date();
  var blob = new Blob([JSON.stringify({version:1,exportedAt:d.toISOString(),entries:entries,initBal:initBal},null,2)],{type:'application/json'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = '소희가계부_백업_' + d.getFullYear() + String(d.getMonth()+1).padStart(2,'0') + String(d.getDate()).padStart(2,'0') + '.json';
  a.click(); URL.revokeObjectURL(url); showToast('백업 파일을 저장했어요');
}

function importData(input) {
  var file = input.files[0]; if (!file) return;
  var reader = new FileReader();
  reader.onload = function(ev) {
    try {
      var data = JSON.parse(ev.target.result);
      if (!data.entries || !Array.isArray(data.entries)) throw new Error('형식 오류');
      var tsSet = {};
      for (var i = 0; i < entries.length; i++) tsSet[entries[i].ts] = true;
      var added = 0;
      for (var i = 0; i < data.entries.length; i++) { if (!tsSet[data.entries[i].ts]) { entries.push(data.entries[i]); added++; } }
      if (data.initBal) { var ks = Object.keys(data.initBal); for (var i = 0; i < ks.length; i++) { if (!initBal[ks[i]]) initBal[ks[i]] = data.initBal[ks[i]]; } }
      save(); renderSummary(); renderStorageInfo();
      showToast('복원 완료! ' + added + '건 추가됐어요'); input.value = '';
    } catch(err) { showToast('파일을 읽을 수 없어요'); }
  };
  reader.readAsText(file);
}

function resetData() {
  if (!confirm('정말 모든 데이터를 삭제할까요?\n백업 파일을 먼저 저장해두세요.')) return;
  if (!confirm('한 번 더 확인할게요. 전체 삭제할까요?')) return;
  entries = []; initBal = {}; save(); renderSummary(); renderStorageInfo(); showToast('초기화 완료');
}

function renderStorageInfo() {
  var size = ((JSON.stringify(entries).length + JSON.stringify(initBal).length) / 1024).toFixed(1);
  var out = 0, inp = 0, maxTs = 0;
  for (var i = 0; i < entries.length; i++) {
    if (entries[i].type==='out') out++; else inp++;
    if (entries[i].ts > maxTs) maxTs = entries[i].ts;
  }
  var last = maxTs ? new Date(maxTs).toLocaleDateString('ko-KR') : '-';
  document.getElementById('storage-info').innerHTML = '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px"><div><div style="font-size:11px;color:var(--hint);margin-bottom:2px">지출 내역</div><div style="font-weight:500">'+out+'건</div></div><div><div style="font-size:11px;color:var(--hint);margin-bottom:2px">수입 내역</div><div style="font-weight:500">'+inp+'건</div></div><div><div style="font-size:11px;color:var(--hint);margin-bottom:2px">저장 용량</div><div style="font-weight:500">'+size+' KB</div></div><div><div style="font-size:11px;color:var(--hint);margin-bottom:2px">마지막 입력</div><div style="font-weight:500">'+last+'</div></div></div>';
}

// 초기화
(function() {
  var opts = document.getElementById('sel-month').options;
  for (var i = 0; i < opts.length; i++) opts[i].selected = (+opts[i].value === curMonth);
  var sel = document.getElementById('out-item');
  for (var i = 0; i < ITEMS.length; i++) {
    var o = document.createElement('option');
    o.value = i;
    o.textContent = '[' + ITEMS[i].c + '] ' + ITEMS[i].n + (ITEMS[i].b ? ' (' + fmt(ITEMS[i].b) + ')' : '');
    sel.appendChild(o);
  }
  var today = (function() { var d = new Date(); return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'); })();
  document.getElementById('out-date').value = today;
  document.getElementById('in-date').value = today;
  renderSummary();
})();
</script>
</body>
</html>
